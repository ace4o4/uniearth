<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="100" height="100" rx="22" ry="22" fill="url(#bg)"/>
  <!-- Globe arc lines (decorative) -->
  <ellipse cx="50" cy="50" rx="26" ry="26" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
  <ellipse cx="50" cy="50" rx="14" ry="26" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <line x1="24" y1="50" x2="76" y2="50" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
  <!-- Bold "U" lettermark, white -->
  <text x="50" y="67" font-family="Arial Black, sans-serif" font-size="46" font-weight="900"
        text-anchor="middle" fill="white" letter-spacing="-1">U</text>
</svg>